# Configuracion del servidor
server.port=9090

# Configuracion de PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/hospital_db
spring.datasource.username=postgres
spring.datasource.password=28demarzo
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion JPA Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuracion de logging
logging.level.org.springframework.web=DEBUG
logging.level.com.hospital=DEBUG
logging.level.com.hospital.aspect=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Configuracion adicional
spring.application.name=Hospital Management System

# JWT Configuration
# Secret en Base64 de 32+ bytes (256 bits minimo para HS256)
jwt.secret=Y2xhdWRlc2VjcmV0a2V5aG9zcGl0YWxzeXN0ZW0yMDI0c3ByaW5nYm9vdA==
jwt.expiration=86400000

# SQL initialization (crea usuario admin al arrancar)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
